<script>
const AQ=[{"q": "你在一個國際環保論壇上，有人問起「IPCC」是什麼組織，你應該怎麼回答？", "options": ["IPCC 是國際氣象組織，負責預測全球氣象情勢", "IPCC 是國際環保聯盟，推動各國環保政策的執行", "IPCC 是聯合國政 府間氣候變遷專門委員會，專門監督全球氣候變遷並提供相關科學報告", "IPCC 是國際氣候控制委員會，負責確保各國減少二 氧化碳排放"], "ans": "C"}, {"q": "塑膠袋的發明者斯坦•圖靈創造可重複使用的塑膠袋的初衷是什麼？", "options": ["為了取代紙袋", "為了減少環境汙染", "為了節省成本", "為了增加樹木伐木數量"], "ans": "A"}, {"q": "你參加一個環保教育工作坊，講師提到了「2030 年」和「2050 年」的重要性，你應該怎麼理解？", "options": ["2030 年和2050 年是關鍵的時間點，決定地球氣候變遷的未來走向", "2030 年和2050 年是全球慶祝環保節日的日期", "2030 年和2050 年是科學家預測到將有嚴重的自然災害發生的時間點", "2030 年和2050 年是聯合國成立的紀念日"], "ans": "A"}, {"q": "根據全球炙熱化的情境，為什麼學者認為1990 年代中後期出生的Z 世代將會是面臨全球暖化最嚴重的世代？", "options": ["因為Z 世代在氣候變遷議題上缺乏關注和行動", "因為Z 世代將在世紀末經歷更極端的氣候事件", "因為Z 世代擁有更多 科技工具應對氣候變遷", "因為Z 世代的生活方式對全球炙熱化有積極影響"], "ans": "B"}, {"q": "你參加一個氣候變遷座談會，有人問你「1.5℃」代表什麼，你應該怎麼回答？", "options": ["1.5℃代表地球的最低氣溫，保護極地生態系統", "1.5℃代表地球的平均海平面上升速度，超過此速度將對沿海地區造成嚴 重影響", "1.5℃代表地球的最高氣溫，適合農業和生態多樣性的發展", "1.5℃代表地球的平均氣溫，超過此溫度將對人類生 存造成危害"], "ans": "D"}, {"q": "身為全球最高層的外交官，聯合國秘書長古特瑞斯（Antonio Guterres）幾乎是最有能力拯救生物多樣性的人。他不斷呼籲，在面 對氣候崩潰時，我們應該採取何種行動？", "options": ["只在特定時間和地點採取應對措施", "拯救地球的方法應無所不在、無所不有、無時不刻", "無需任何行動，因為氣候崩 潰無法避免", "只在政府層面採取措施，無需個人參與"], "ans": "B"}, {"q": "第6 次生物大滅絕是在什麼時間發生的？", "options": ["19 世紀", "20 世紀", "此時正在發生", "未來預計發生"], "ans": "C"}, {"q": "為什麼經濟學家羅伯特•戈登（Robert J. Gordon）認為我們現在的生活水平難以再與19 世紀的前輩相比？", "options": ["因為19 世紀的工業化時期帶來了高速增長和創新", "因為當時的人們比現代人更具創新性", "因為19 世紀的前輩使用了 更多的塑膠袋", "因為現代人對環境更加關注"], "ans": "A"}, {"q": "挪威的社會福利體系，如何幫助減少貧富差距？", "options": ["透明的稅制", "高收入的國民平均所得", "與大自然和諧相處", "擁有自己的貨幣"], "ans": "A"}, {"q": "芬蘭的幸福指數主要使用哪些指標來衡量？", "options": ["國內生產總值和出口量", "失業率和通膨率", "人均GDP 和平均健康壽命", "政府支出和貿易順差"], "ans": "C"}, {"q": "什麼是芬蘭人的快樂秘訣？", "options": ["高收入", "免費大學教育", "高稅負", "不比較"], "ans": "D"}, {"q": "什麼是地熱能？", "options": ["利用地底岩漿來發電", "利用地下石油來發電", "利用地下礦物來發電", "利用地下熱水來發電"], "ans": "D"}, {"q": "芬蘭的社會福利體系有哪些特點？", "options": ["高收入和高稅負", "低收入和低物價", "完全免費的大學教育", "沒有社會福利體系"], "ans": "A"}, {"q": "為什麼人們願意在芬蘭繳納高稅負？", "options": ["因為政府強制要求", "因為他們感受到國家為他們提供的福祉", "因為他們不滿意社會福利體系", "因為他們喜歡 let CQ=[];
function sf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function loadQ(){
  CQ=sf(AQ).slice(0,30);
  const c=document.getElementById('qc');
  c.innerHTML='';
  document.getElementById('sbox').style.display='none';
  document.getElementById('bsub').style.display='inline-block';
  document.getElementById('progf').style.width='0%';
  const L=['A','B','C','D'];
  CQ.forEach((q,i)=>{
    const o=q.options.map((t,oi)=>`<div class="opt" id="o${i}_${oi}" onclick="sl2(${i},${oi})"><div class="ol">${L[oi]}</div><div class="ot">${t}</div></div>`).join('');
    const d=document.createElement('div');
    d.className='qcard';d.id='c'+i;
    d.innerHTML=`<div class="qnum">第 ${i+1} 題</div><div class="qtext">${q.q}</div><div class="opts">${o}</div><div class="rb" id="b${i}"></div>`;
    c.appendChild(d);
  });
  up();
  window.scrollTo({top:0,behavior:'smooth'});
}
function sl2(qi,oi){
  const card=document.getElementById('c'+qi);
  if(card.classList.contains('correct')||card.classList.contains('wrong'))return;
  for(let i=0;i<4;i++)document.getElementById('o'+qi+'_'+i).classList.remove('sel');
  document.getElementById('o'+qi+'_'+oi).classList.add('sel');
  up();
}
function up(){
  let n=0;
  CQ.forEach((_,i)=>{
    for(let j=0;j<4;j++){
      const e=document.getElementById('o'+i+'_'+j);
      if(e&&(e.classList.contains('sel')||e.classList.contains('ca')||e.classList.contains('wa'))){n++;break;}
    }
  });
  document.getElementById('progf').style.width=(n/30*100)+'%';
}
function subQ(){
  const L=['A','B','C','D'];let ok=0;
  CQ.forEach((q,i)=>{
    const card=document.getElementById('c'+i);
    const badge=document.getElementById('b'+i);
    let ua=null;
    for(let j=0;j<4;j++){const e=document.getElementById('o'+i+'_'+j);if(e.classList.contains('sel')){ua=L[j];break;}}
    for(let j=0;j<4;j++){document.getElementById('o'+i+'_'+j).style.cursor='default';}
    const ci=L.indexOf(q.ans);
    const ce=document.getElementById('o'+i+'_'+ci);
    if(ua===null){
      badge.className='rb no';badge.textContent='⚠️ 未作答・正確答案：'+q.ans;
      ce.classList.add('ca');card.classList.add('wrong');
    }else if(ua===q.ans){
      badge.className='rb ok';badge.textContent='✅ 答對了！';
      card.classList.add('correct');ok++;
    }else{
      const ui=L.indexOf(ua);
      document.getElementById('o'+i+'_'+ui).classList.remove('sel');
      document.getElementById('o'+i+'_'+ui).classList.add('wa');
      ce.classList.add('ca');
      badge.className='rb no';badge.textContent='❌ 答錯了・正確答案：'+q.ans;
      card.classList.add('wrong');
    }
  });
  const pct=Math.round(ok/30*100);
  document.getElementById('sn').textContent=ok+' / 30';
  document.getElementById('sl').textContent='正確率 '+pct+'%';
  const g=pct>=90?'🏆 優秀！繼續保持！':pct>=70?'👍 不錯，再加把勁！':pct>=50?'📚 還需多讀，加油！':'💪 繼續努力！';
  document.getElementById('sg').textContent=g;
  document.getElementById('sbox').style.display='block';
  document.getElementById('bsub').style.display='none';
  document.getElementById('progf').style.width='100%';
  document.getElementById('sbox').scrollIntoView({behavior:'smooth',block:'center'});
}
window.addEventListener('scroll',()=>{
  const b=document.getElementById('btop');
  b.style.display=window.scrollY>400?'flex':'none';
});
loadQ();
</script>
